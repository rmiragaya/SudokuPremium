    <stop offset="1" stop-color="#D6A430"/>
  </linearGradient>

  <filter id="softLogoShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
  </filter>

  <filter id="goldInsetShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.18"/>
    <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#F2C84B" flood-opacity="0.18"/>
  </filter>

  <filter id="textShadow" x="-5%" y="-10%" width="110%" height="130%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000000" flood-opacity="0.24"/>
  </filter>
</defs>

<rect width="1024" height="1024" fill="url(#darkBg)"/><rect width="1024" height="1024" fill="url(#darkGlow)"/>

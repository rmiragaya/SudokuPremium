<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="darkBg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#10172B"/>
    <stop offset="1" stop-color="#0A0F1E"/>
  </linearGradient>

  <radialGradient id="darkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(520 170) rotate(90) scale(680)">
    <stop offset="0" stop-color="#1B2D55" stop-opacity="0.42"/>
    <stop offset="1" stop-color="#1B2D55" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="blueText" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#69C5FF"/>
    <stop offset="1" stop-color="#2D8DDF"/>
  </linearGradient>

  <linearGradient id="goldFill" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#F9D85E"/>
